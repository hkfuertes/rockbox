########################
# Audiobookshelf Config #
########################
## Copy this file to /sdcard/.rockbox/audiobookshelf.cfg on the device
## and fill in your values before launching the plugin.

## Your Audiobookshelf server URL (HTTPS required)
server_url: https://your.abs.server

## Your Audiobookshelf API token
## Settings -> Users -> (your user) -> API Token
token: your_api_token

## The ID of the Books library to browse
## Open your server in a browser and navigate to the library;
## the ID is the last segment of the URL, e.g. lib_abc123def456
library_id: lib_abc123def456

## Directory on the device where downloaded audiobooks are saved
## Must stay under /sdcard/audiobookshelf/
download_dir: /sdcard/audiobookshelf/downloads

## Number of books per page (1-50, default 20)
page_size: 20
