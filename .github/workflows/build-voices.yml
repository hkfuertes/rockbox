name: Build Voice Files

on:
  push:
    branches: [ "y1-240p" ]
    paths:
      - 'apps/lang/*.lang'
      - 'tools/voice.pl'
      - '.github/workflows/build-voices.yml'
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to build (e.g., english, deutsch, francais)'
        required: true
        default: 'english'
      target:
        description: 'Target ID'
        required: true
        default: '74'

jobs:
  build-voices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          perl \
          libperl-dev \
          ffmpeg \
          sox \
          libsox-fmt-all \
          build-essential \
          cmake \
          pkg-config \
          libssl-dev \
          libffi-dev \
          python3-dev \
          python3-pip \
          python3-venv
        
    - name: Install Piper TTS
      run: |
        pip install piper-tts
        pip install onnxruntime
        
    - name: Download Piper models
      run: |
        mkdir -p piper_models
        cd piper_models
        
        # Download English model (you can add more models as needed)
        wget https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/semaine/medium/en_GB-semaine-medium.onnx
        wget https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/semaine/medium/en_GB-semaine-medium.onnx.json
        
        # Set environment variable for Piper model directory
        echo "PIPER_MODEL_DIR=$(pwd)" >> $GITHUB_ENV
        
    - name: Build tools 
      run: |
        cd tools/rbspeex
        make
        cd ..
        make voicefont
        make wavtrim
        ls -la
        
    - name: Configure voice generation
      run: |
        cd tools
        # Create a simple configuration for voice generation
        echo "TTS_ENGINE=piper" > voice_config
        echo "TTS_OPTS=--model \$PIPER_MODEL_DIR/en_GB-semaine-medium.onnx" >> voice_config
        echo "ENCODER=../rbspeex/rbspeexenc" >> voice_config
        echo "ENC_OPTS=-q 7 -c 10" >> voice_config
        
    - name: Generate voice file
      run: |
        cd tools
        export PIPER_MODEL_DIR="$GITHUB_WORKSPACE/piper_models"
        
        # Build voice file for the specified language
        LANGUAGE="${{ github.event.inputs.language || 'english' }}"
        TARGET_ID="${{ github.event.inputs.target || '74' }}"
        
        echo "Building voice file for language: $LANGUAGE, target: $TARGET_ID"
        
        # Run voice generation
        ./voice.pl -V -t=android:crossfade:headphone_detection:hotkey:lcd_bitmap:lcd_non-mono:lcd_color:pitchscreen:quickscreen:rtc:swcodec:tagcache:touchscreen:large_plugin_buffer:ab_repeat_buttons:albumart:perceptual_volume:codec_aac_he -i=$TARGET_ID -l=$LANGUAGE -s=piper -S="" -e=rbspeexenc -E="-q 7 -c 10" -v
        
        # Zip voice files
        mkdir -p .rockbox/langs
        mv *.talk .rockbox/langs/.
        mv *.voice .rockbox/langs/.
        zip -r voices.zip .rockbox

    - name: Create release
      id: create_release
      uses: shogo82148/actions-create-release@v1
      with:
        release_name: Voice Files (latest) - ${{ github.sha }}
        tag_name: voices-${{ github.event.inputs.language || 'english' }}-${{ github.run_id }}
        prerelease: true
        
    - name: upload libs 
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./tools/voices.zip
        asset_name: voices.zip
        asset_content_type: application/zip
