name: Build All Voice Files

on:
  push:
    branches: [ "y1" ]
    paths:
      - 'apps/lang/*.lang'
      - 'tools/voice.pl'
      - '.github/workflows/build-all-voices.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target ID'
        required: true
        default: '74'

jobs:
  build-voices:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ${{ fromJson('["english","deutsch","francais","espanol","basque","bulgarian","czech","dansk","eesti","greek","italiano","latviesu","magyar","moldoveneste","nederlands","norsk","polski","portugues-brasileiro","romaneste","russian","slovak","srpski","svenska","turkce","ukrainian"]') }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          perl \
          libperl-dev \
          ffmpeg \
          sox \
          libsox-fmt-all \
          build-essential \
          cmake \
          pkg-config \
          libssl-dev \
          libffi-dev \
          python3-dev \
          python3-pip \
          python3-venv \
          espeak \
          espeak-data
        
    - name: Install Piper TTS
      run: |
        pip install piper-tts
        pip install onnxruntime
        
    - name: Download Piper models
      run: |
        mkdir -p piper_models
        cd piper_models
        
        # Download models for different languages
        # English
        wget -O en_GB-semaine-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/semaine/medium/en_GB-semaine-medium.onnx
        wget -O en_GB-semaine-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_GB/semaine/medium/en_GB-semaine-medium.onnx.json
        
        # German
        wget -O de_DE-thorsten-high.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx
        wget -O de_DE-thorsten-high.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/de/de_DE/thorsten/high/de_DE-thorsten-high.onnx.json
        
        # French
        wget -O fr_FR-siwis-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/fr/fr_FR/siwis/medium/fr_FR-siwis-medium.onnx
        wget -O fr_FR-siwis-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/fr/fr_FR/siwis/medium/fr_FR-siwis-medium.onnx.json
        
        # Spanish
        wget -O es_ES-sharvard-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/es/es_ES/sharvard/medium/es_ES-sharvard-medium.onnx
        wget -O es_ES-sharvard-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/es/es_ES/sharvard/medium/es_ES-sharvard-medium.onnx.json
        
        # Czech
        wget -O cs_CZ-jirka-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/cs/cs_CZ/jirka/medium/cs_CZ-jirka-medium.onnx
        wget -O cs_CZ-jirka-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/cs/cs_CZ/jirka/medium/cs_CZ-jirka-medium.onnx.json
        
        # Danish
        wget -O da_DK-talesyntese-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/da/da_DK/talesyntese/medium/da_DK-talesyntese-medium.onnx
        wget -O da_DK-talesyntese-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/da/da_DK/talesyntese/medium/da_DK-talesyntese-medium.onnx.json
        
        # Greek
        wget -O el_GR-rapunzelina-low.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/el/el_GR/rapunzelina/low/el_GR-rapunzelina-low.onnx
        wget -O el_GR-rapunzelina-low.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/el/el_GR/rapunzelina/low/el_GR-rapunzelina-low.onnx.json
        
        # Italian
        wget -O it_IT-paola-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/it/it_IT/paola/medium/it_IT-paola-medium.onnx
        wget -O it_IT-paola-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/it/it_IT/paola/medium/it_IT-paola-medium.onnx.json
        
        # Latvian
        wget -O lv_LV-aivars-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/lv/lv_LV/aivars/medium/lv_LV-aivars-medium.onnx
        wget -O lv_LV-aivars-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/lv/lv_LV/aivars/medium/lv_LV-aivars-medium.onnx.json
        
        # Hungarian
        wget -O hu_HU-anna-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/hu/hu_HU/anna/medium/hu_HU-anna-medium.onnx
        wget -O hu_HU-anna-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/hu/hu_HU/anna/medium/hu_HU-anna-medium.onnx.json
        
        # Dutch
        wget -O nl_NL-mls-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/nl/nl_NL/mls/medium/nl_NL-mls-medium.onnx
        wget -O nl_NL-mls-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/nl/nl_NL/mls/medium/nl_NL-mls-medium.onnx.json
        
        # Romanian
        wget -O ro_RO-mihai-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/ro/ro_RO/mihai/medium/ro_RO-mihai-medium.onnx
        wget -O ro_RO-mihai-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/ro/ro_RO/mihai/medium/ro_RO-mihai-medium.onnx.json
        
        # Norwegian
        wget -O no_NO-talesyntese-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/no/no_NO/talesyntese/medium/no_NO-talesyntese-medium.onnx
        wget -O no_NO-talesyntese-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/no/no_NO/talesyntese/medium/no_NO-talesyntese-medium.onnx.json
        
        # Polish
        wget -O pl_PL-gosia-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/pl/pl_PL/gosia/medium/pl_PL-gosia-medium.onnx
        wget -O pl_PL-gosia-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/pl/pl_PL/gosia/medium/pl_PL-gosia-medium.onnx.json
        
        # Portuguese (Brazilian)
        wget -O pt_BR-faber-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/pt/pt_BR/faber/medium/pt_BR-faber-medium.onnx
        wget -O pt_BR-faber-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/pt/pt_BR/faber/medium/pt_BR-faber-medium.onnx.json
        
        # Russian
        wget -O ru_RU-irina-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/ru/ru_RU/irina/medium/ru_RU-irina-medium.onnx
        wget -O ru_RU-irina-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/ru/ru_RU/irina/medium/ru_RU-irina-medium.onnx.json
        
        # Slovak
        wget -O sk_SK-lili-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/sk/sk_SK/lili/medium/sk_SK-lili-medium.onnx
        wget -O sk_SK-lili-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/sk/sk_SK/lili/medium/sk_SK-lili-medium.onnx.json
        
        # Serbian
        wget -O sr_RS-serbski_institut-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/sr/sr_RS/serbski_institut/medium/sr_RS-serbski_institut-medium.onnx
        wget -O sr_RS-serbski_institut-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/sr/sr_RS/serbski_institut/medium/sr_RS-serbski_institut-medium.onnx.json
        
        # Swedish
        wget -O sv_SE-nst-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/sv/sv_SE/nst/medium/sv_SE-nst-medium.onnx
        wget -O sv_SE-nst-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/sv/sv_SE/nst/medium/sv_SE-nst-medium.onnx.json
        
        # Turkish
        wget -O tr_TR-fettah-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/tr/tr_TR/fettah/medium/tr_TR-fettah-medium.onnx
        wget -O tr_TR-fettah-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/tr/tr_TR/fettah/medium/tr_TR-fettah-medium.onnx.json
        
        # Ukrainian
        wget -O uk_UA-ukrainian_tts-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/uk/uk_UA/ukrainian_tts/medium/uk_UA-ukrainian_tts-medium.onnx
        wget -O uk_UA-ukrainian_tts-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/uk/uk_UA/ukrainian_tts/medium/uk_UA-ukrainian_tts-medium.onnx.json
        
        # Set environment variable for Piper model directory
        echo "PIPER_MODEL_DIR=$(pwd)" >> $GITHUB_ENV
        
    - name: Build tools
      run: |
        cd tools/rbspeex
        make
        cd ..
        make voicefont
        make wavtrim
        ls -la
        
    - name: Generate voice file
      run: |
        cd tools
        export PIPER_MODEL_DIR="$GITHUB_WORKSPACE/piper_models"
        
        # Map languages to Piper models
        case "${{ matrix.language }}" in
          "english")
            MODEL="en_GB-semaine-medium.onnx"
            ;;
          "deutsch")
            MODEL="de_DE-thorsten-high.onnx"
            ;;
          "francais")
            MODEL="fr_FR-siwis-medium.onnx"
            ;;
          "espanol")
            MODEL="es_ES-sharvard-medium.onnx"
            ;;
          "czech")
            MODEL="cs_CZ-jirka-medium.onnx"
            ;;
          "dansk")
            MODEL="da_DK-talesyntese-medium.onnx"
            ;;
          "greek")
            MODEL="el_GR-rapunzelina-low.onnx"
            ;;
          "italiano")
            MODEL="it_IT-paola-medium.onnx"
            ;;
          "latviesu")
            MODEL="lv_LV-aivars-medium.onnx"
            ;;
          "magyar")
            MODEL="hu_HU-anna-medium.onnx"
            ;;
          "moldoveneste")
            MODEL="ro_RO-mihai-medium.onnx"
            ;;
          "nederlands")
            MODEL="nl_NL-mls-medium.onnx"
            ;;
          "norsk")
            MODEL="no_NO-talesyntese-medium.onnx"
            ;;
          "polski")
            MODEL="pl_PL-gosia-medium.onnx"
            ;;
          "portugues-brasileiro")
            MODEL="pt_BR-faber-medium.onnx"
            ;;
          "romaneste")
            MODEL="ro_RO-mihai-medium.onnx"
            ;;
          "russian")
            MODEL="ru_RU-irina-medium.onnx"
            ;;
          "slovak")
            MODEL="sk_SK-lili-medium.onnx"
            ;;
          "srpski")
            MODEL="sr_RS-serbski_institut-medium.onnx"
            ;;
          "svenska")
            MODEL="sv_SE-nst-medium.onnx"
            ;;
          "turkce")
            MODEL="tr_TR-fettah-medium.onnx"
            ;;
          "ukrainian")
            MODEL="uk_UA-ukrainian_tts-medium.onnx"
            ;;
          # Languages without Piper models - will use espeak as fallback
          "basque"|"bulgarian"|"eesti")
            MODEL=""
            echo "No Piper model available for ${{ matrix.language }}, will use espeak fallback"
            ;;
          *)
            echo "Unknown language: ${{ matrix.language }}"
            exit 1
            ;;
        esac
        
        TARGET_ID="${{ github.event.inputs.target || '74' }}"
        
        echo "Building voice file for language: ${{ matrix.language }}, target: $TARGET_ID, model: $MODEL"
        
        # Run voice generation with appropriate engine
        if [ -n "$MODEL" ]; then
          # Use Piper for languages with models
          ./voice.pl -V -t=android:crossfade:headphone_detection:hotkey:lcd_bitmap:lcd_non-mono:lcd_color:pitchscreen:quickscreen:rtc:swcodec:tagcache:touchscreen:large_plugin_buffer:ab_repeat_buttons:albumart:perceptual_volume:codec_aac_he -i=$TARGET_ID -l=${{ matrix.language }} -s=piper -S="" -e=rbspeexenc -E="-q 7 -c 10" -v
        else
          # Use espeak for languages without Piper models
          ./voice.pl -V -t=android:crossfade:headphone_detection:hotkey:lcd_bitmap:lcd_non-mono:lcd_color:pitchscreen:quickscreen:rtc:swcodec:tagcache:touchscreen:large_plugin_buffer:ab_repeat_buttons:albumart:perceptual_volume:codec_aac_he -i=$TARGET_ID -l=${{ matrix.language }} -s=espeak -S="" -e=rbspeexenc -E="-q 7 -c 10" -v
        fi
        
        # Create output directory for this language
        mkdir -p ../voice_outputs/${{ matrix.language }}
        mv *.talk ../voice_outputs/${{ matrix.language }}/.
        mv *.voice ../voice_outputs/${{ matrix.language }}/.

    - name: Upload voice files as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: voice-files-${{ matrix.language }}
        path: voice_outputs/${{ matrix.language }}/
        retention-days: 1

  combine-voices:
    needs: build-voices
    runs-on: ubuntu-latest
    steps:
    - name: Download all voice artifacts
      uses: actions/download-artifact@v4
      with:
        path: voice_artifacts
        
    - name: Combine all voice files
      run: |
        mkdir -p .rockbox/langs
        
        # Extract all voice files from artifacts
        for artifact in voice_artifacts/voice-files-*/; do
          if [ -d "$artifact" ]; then
            echo "Processing artifact: $artifact"
            cp -r "$artifact"/* .rockbox/langs/.
          fi
        done
        
        # Create combined zip file
        zip -r voices.zip .rockbox
        
        echo "Combined voice files for all European languages"
        ls -la .rockbox/langs/
        ls -la voices.zip

    - name: Create release
      id: create_release
      uses: shogo82148/actions-create-release@v1
      with:
        release_name: Voice Files (latest) - ${{ github.sha }}
        tag_name: voices-${{ github.run_id }}
        prerelease: true
        
    - name: Upload combined voice files
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: voices.zip
        asset_name: voices.zip
        asset_content_type: application/zip
