name: Build latest APK (360p)

on:
  push:
    branches: [ "y1" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_PATH: /usr/local/lib/android/sdk
      ANDROID_NDK_PATH: /home/runner/android-ndk-r10e
      ANDROID_NDK_ROOT: /home/runner/android-ndk-r10e

    steps:
    - uses: actions/checkout@v4
    # 360p Build Process
    - name: prepare build environment (360p)
      run: |
        sudo apt install lib32z1
        sudo apt install openjdk-17-jdk
        java --version
        cd android
        yes | ./installToolchain.sh
    - name: create build directory
      run: |
        mkdir android/build
    - name: configure
      run: |
        cd android/build
        ../../tools/configure --target=201 --lcdwidth=480 --lcdheight=360 --type=n
    - name: make
      run: |
        cd android/build
        make
    - name: make classes
      run: |
        cd android/build
        make classes
    - name: make zip
      run: |
        cd android/build
        make zip
    - name: build unsigned apk
      run: |
        cd android/build
        make unsigned-apk
    - name: sign apk
      run: |
        # Check if apksigner is available (Android SDK Build Tools 24.0.3+)
        APKSIGNER=""
        if command -v apksigner >/dev/null 2>&1; then
            APKSIGNER="apksigner"
        elif [ -n "$ANDROID_SDK_PATH" ] && [ -f "$ANDROID_SDK_PATH/build-tools/$(ls -1 "$ANDROID_SDK_PATH/build-tools" | tail -1)/apksigner" ]; then
            APKSIGNER="$ANDROID_SDK_PATH/build-tools/$(ls -1 "$ANDROID_SDK_PATH/build-tools" | tail -1)/apksigner"
        fi
        cd android/build
        $APKSIGNER sign --key ../platform.pk8 --cert ../platform.x509.pem rockbox_unsigned.apk
        cp rockbox_unsigned.apk rockbox.apk
    - name: gzip libs
      run: |
        cd android/build
        tar -czvf libs.tar.gz libs/
    - name: bundle image
      run: |
        mkdir base
        cd base
        wget https://github.com/rockbox-y1/rockbox/releases/latest/download/rom.zip
        wget https://github.com/rockbox-y1/rockbox/releases/download/stock-menu/com.innioasis.y1_2.7.2.apk
        unzip rom.zip
        mkdir mount_sys
        mkdir mount_user
        sudo mount -t ext4 -o loop system.img mount_sys
        sudo mount -t ext4 -o loop userdata.img mount_user
        sudo cp com.innioasis.y1_2.7.2.apk mount_user/app/com.innioasis.y1-1.apk
        sudo cp ../android/build/rockbox.apk mount_sys/app/org.rockbox.apk
        sudo chmod 644 mount_sys/app/org.rockbox.apk
        sudo chown root:root mount_sys/app/org.rockbox.apk
        sudo mkdir -p mount_sys/lib
        sudo cp ../android/build/libs/armeabi/librockbox.so mount_sys/lib/.
        sudo chmod 644 mount_sys/lib/librockbox.so
        sudo chown root:root mount_sys/lib/librockbox.so
        sudo rm -rf mount_user/data/org.rockbox/lib
        sudo mkdir -p mount_user/data/org.rockbox/lib
        sudo cp ../android/build/libs/armeabi/* mount_user/data/org.rockbox/lib/.

        sudo cp ../android/scripts/install-recovery.sh mount_sys/etc/install-recovery.sh
        sudo chmod 755 mount_sys/etc/install-recovery.sh
        sudo mkdir -p mount_sys/etc/init.d
        sudo cp ../android/scripts/99Y1ButtonScript mount_sys/etc/init.d/
        sudo chmod 755 mount_sys/etc/init.d/99Y1ButtonScript
        sudo cp ../android/scripts/switch-to-stock.sh mount_user/data/

        sudo cp ../android/scripts/Rockbox.kl mount_sys/usr/keylayout/Rockbox.kl
        sudo cp ../android/scripts/Stock.kl mount_sys/usr/keylayout/Stock.kl
        sudo cp ../android/scripts/Rockbox.kl mount_sys/usr/keylayout/Generic.kl

        sudo umount mount_sys
        sudo umount mount_user
        rm rom.zip
        rm com.innioasis.y1_2.7.2.apk
        rm -r mount_sys
        rm -r mount_user
        cd ../
        zip -j rom.zip base/*
    - name: Set release date
      id: date
      run: echo "release_date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT
    - name: create release
      id: create_release
      uses: shogo82148/actions-create-release@v1
      with:
        release_name: Rockbox-Y1 Nightly-${{ steps.date.outputs.release_date }} (360p)
        tag_name: nightly-360p-${{ github.sha }}
        prerelease: false
        make_latest: false
    - name: upload apk
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./android/build/rockbox.apk
        asset_name: rockbox-${{ github.sha }}-360p.apk
        asset_content_type: application/vnd.android.package-archive
    - name: upload libs 
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./android/build/libs.tar.gz
        asset_name: libs.tar.gz
        asset_content_type: application/gzip
    - name: upload rom 
      uses: shogo82148/actions-upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./rom.zip
        asset_name: rom.zip
        asset_content_type: application/zip
