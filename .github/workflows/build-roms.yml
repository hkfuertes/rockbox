    # Set release date
    - name: Set release date
      id: date
      run: echo "release_date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT
    
    # Create single release
    - name: create release
      id: create_release
      uses: shogo82148/actions-create-release@v1
      with:
        release_name: Rockbox-Y1 Nightly-${{ steps.date.outputs.release_date }}
        tag_name: nightly-${{ github.sha }}
        prerelease: false
        make_latest: true
    
    # Upload all assets to single release
